# cargo-deny configuration (ADR 0008 ISC-05 hygiene contract).
# Install: cargo install cargo-deny
# Run: cargo deny check bans

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-apple-darwin" },
]

[bans]
multiple-versions = "warn"
wildcards = "warn"

# Ecosystem libraries are forbidden outside their designated adapter crate.
# If a core crate (trellis-core, trellis-verify-wos, trellis-types) transitively
# pulls in any of these, cargo-deny fails loud.
deny = [
    { name = "c2pa", wrappers = ["trellis-interop-c2pa"] },
    { name = "ssi-*", wrappers = ["trellis-interop-did"] },
    { name = "did-method-key", wrappers = ["trellis-interop-did"] },
]
