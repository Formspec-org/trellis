# are allowed to remain uncovered; but the lint FAILS on two mistakes:
#
#   1. A listed entry is now covered by a vector   → remove it from this file.
#   2. An unlisted entry is uncovered              → either add a vector, or
#                                                    add the entry here with a
#                                                    note.
