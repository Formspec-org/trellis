`expected-watermark.cbor`; `stale_acknowledged = false` is pinned; \
`staff_view_ref = "urn:trellis:staff-view:test-005/default"`. Spec anchor: \
Core §6.7 registers `trellis.staff-view-decision-binding.v1` as a Phase-1 \
extension; §29.3 pins the CDDL; §19 step 4.k pins verifier-side decode-and- \
validate on presence of the extension key. Runs in its own ledger scope \
`test-staff-view-ledger` to avoid sequence-0 collision."""

