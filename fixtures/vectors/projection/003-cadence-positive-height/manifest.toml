id          = "projection/003-cadence-positive-height"
op          = "projection"
status      = "active"
description = """O-3 Test 3 positive cadence fixture. A six-event canonical chain declares \
a height-based snapshot cadence of every two events and includes checkpoints at tree_size \
2, 4, and 6. Exercises TR-OP-008 by proving that the declared cadence is observable in \
fixture-bound checkpoint bytes with no required checkpoint gaps."""

[coverage]
tr_op = [
    "TR-OP-008",  # Declared snapshot cadence gaps MUST be detected and surfaced.
]
companion_sections = ["§16.2"]

[inputs]
chain = "input-chain.cbor"
checkpoints = [
    "input-checkpoint-002.cbor",
    "input-checkpoint-004.cbor",
    "input-checkpoint-006.cbor",
]

[expected]
cadence_report = "expected-cadence-report.cbor"

[cadence]
kind = "height-based"
interval = 2
required_tree_sizes = [2, 4, 6]
observed_tree_sizes = [2, 4, 6]
expect_failure = false

[derivation]
document = "derivation.md"
