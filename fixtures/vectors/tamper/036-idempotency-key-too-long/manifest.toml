id = "tamper/036-idempotency-key-too-long"
op = "tamper"
status = "active"
description = "Core §6.1 / §17.2 / §28 structural bound `bstr .size (1..64)` violation — the authored event's `idempotency_key` is 65 bytes (one byte over the upper limit). The Ed25519 signature over the EventPayload is valid (the issuer signed exactly what is stored); §19 step 4.b would pass the signature check, and step 4.d would compute the matching `author_event_hash`. The tamper is detected at the §6.1 / §17.2 structural-bound check, which the verifier MUST run before or alongside per-event integrity checks. `tamper_kind = \"idempotency_key_length_invalid\"` per §17.5. Distinct from `tamper/035-idempotency-key-payload-mismatch` (in-scope conflict, §17.3 clause 3 path) and from `tamper/008-malformed-cose` (CBOR tag-id structural identification) — this is the §6.1 length bound enforcement, orthogonal to both retry-conflict resolution and CBOR structural identification."

