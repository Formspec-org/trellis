id = "tamper/005-chain-truncation"
op = "tamper"
status = "active"
description = "Chain-integrity tamper. The tampered ledger is a one-element dCBOR array carrying only `append/005-prior-head-chain`'s byte-exact COSE_Sign1 envelope; the genesis event (`append/001-minimal-inline-payload`, `sequence = 0`) has been dropped. No event bytes are mutated — the survivor is signed cleanly under issuer-001, its `author_event_hash` and `canonical_event_hash` recomputations both pass, and its protected-header kid resolves against the registry. The tamper surfaces at Core §19 step 4.h (`prev_hash` linkage): the survivor's `sequence = 1` forces the verifier to look up `events[0]`; `events` has length 1 and `events[0]` IS the survivor, whose `canonical_event_hash` (`3d3d5aeb…9f17`) does NOT equal its recorded `prev_hash` (`ef2622f1…4ddb` = the now-omitted genesis event's canonical hash, dangling). Per tamper/001's tamper-kind enum, the row is `event_truncation` — \"A middle event of a chain is absent, and subsequent events' prev_hash values do not link to their recomputed predecessors\"; dropping genesis is a special case (non-head event absent, survivor's prev_hash newly dangling). Per Core §19 step 4.k this is a *localizable* failure: §19 step 9's `integrity_verified` conjunction (\"prev_hash links ... valid\") drops to false; `structure_verified` stays true (the survivor's bytes decode cleanly through step 4.c)."

[coverage]
tr_core = [
    "TR-CORE-020",
    "TR-CORE-023",
]

[inputs]
ledger = "input-tampered-ledger.cbor"
tampered_event = "input-tampered-event.cbor"
signing_key_registry = "input-signing-key-registry.cbor"

[expected.report]
structure_verified = true
integrity_verified = false
readability_verified = true
tamper_kind = "event_truncation"
failing_event_id = "7a8574461a5fb60b6ee60c552e414aaf45aefba3ca1b6cc71fa72d029537c020"
omitted_event_id = "ef2622f1470ba3d9c24b47c0566cab8902b6500fbb3d47bdd77aae068e724ddb"
idempotency_key = "tamper-chain-truncation-005"

[derivation]
document = "derivation.md"
