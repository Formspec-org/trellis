status      = "active"
description = """ADR 0109 protected-header tamper: the envelope is derived from \
`append/001-minimal-inline-payload/expected-event.cbor`, but the signed protected \
header's `artifact_type` value at COSE label `-65538` is changed from the closed \
value `"event"` to `"x-adr0109-unknown"`. The signature bytes are intentionally \
left unchanged; conforming verifiers reject the closed-enum violation before \
signature verification."""

