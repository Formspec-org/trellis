id = "tamper/006-event-reorder"
op = "tamper"
status = "active"
description = "Chain-integrity tamper — event reorder. The tampered ledger is a two-element dCBOR array `[append/005 event, append/001 event]`: both events byte-exact from their upstream append vectors, but their order is swapped so the `sequence = 1` follower sits at index 0 and the `sequence = 0` genesis sits at index 1. No event bytes are mutated — each event signs and decodes cleanly under `issuer-001`, and each `author_event_hash` / `canonical_event_hash` recomputation passes. Core §19 step 4.h surfaces the tamper at index 0: the follower's recorded `prev_hash` (`ef2622f1…4ddb` = append/001's canonical hash) does NOT equal `canonical_event_hash(events[0])` which is the follower's OWN canonical hash (`3d3d5aeb…9f17`). Index 1 passes step 4.h trivially (sequence = 0 → prev_hash == null). Pinned `tamper_kind = event_reorder` per tamper/001's enum; distinct from tamper/005-chain-truncation (one event absent vs. both present but swapped). `integrity_verified = false`; `structure_verified = true`."

[coverage]
tr_core = [
    "TR-CORE-020",
    "TR-CORE-023",
]

[inputs]
ledger = "input-tampered-ledger.cbor"
tampered_event_at_index_0 = "input-tampered-event-at-index-0.cbor"
tampered_event_at_index_1 = "input-tampered-event-at-index-1.cbor"
signing_key_registry = "input-signing-key-registry.cbor"

[expected.report]
