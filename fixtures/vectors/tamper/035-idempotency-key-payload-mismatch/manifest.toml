description = "Core §17.3 clause 3 + §17.5 IdempotencyKeyPayloadMismatch — the tampered ledger is a two-element dCBOR array `[event_a, event_b]` where both events sign legitimately under `issuer-001` and pass §19 step 4.a–4.h individually (sequence monotonicity, prev_hash linkage, content / author / canonical hash recomputation), but they share `(ledger_scope, idempotency_key) = (\"test-response-ledger\", \"idemp-tamper-035-collide\")` while their plaintext payloads differ — yielding distinct `content_hash`, `author_event_hash`, and `canonical_event_hash`. A §17.3 / §17.5-aware verifier walks the ledger and detects the duplicate idempotency identity at index 1 (the conflicting event), flipping `integrity_verified = false` with `tamper_kind = \"idempotency_key_payload_mismatch\"`. The duplicate identity is undefined canonical order per §17.3. Distinct from `tamper/006-event-reorder` (chain linkage break, both events otherwise correct) because chain linkage is intact here; the only violation is at the wire-contract idempotency layer. Demonstrates TR-CORE-160 (verifier rejection) and TR-CORE-162 (in-scope duplicate identity is permanent and rejected, regardless of operator policy)."

