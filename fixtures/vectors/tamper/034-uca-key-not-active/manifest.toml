id          = "tamper/034-uca-key-not-active"
op          = "tamper"
status      = "active"
description = """ADR 0010 §"Verifier obligations" step 6 violation: `signing_kid` resolves to a registry entry with `status = 2` (Retired). Only `Active` (status = 0) is admitted in Phase 1 (`Rotating` is reserved pending rotation-grace ratification per ADR 0010 open question 4 / TODO #5). The COSE envelope verifies (envelope path admits Retired for historical signatures), but the step-6 user-content-attestation key-state check flips `key_active = false` and emits `user_content_attestation_key_not_active`. Adversary intent: issue an attestation under a Retired kid (key-state evasion)."""

