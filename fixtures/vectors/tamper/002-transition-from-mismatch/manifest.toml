id          = "tamper/002-transition-from-mismatch"
op          = "tamper"
status      = "active"
description = """Posture-transition state-continuity tamper. The tampered \
event is a `trellis.custody-model-transition.v1` event whose \
`from_custody_model = "CM-C"` contradicts the deployment's initial \
posture declaration, which pins `custody_model = "CM-B"`. Core §19 \
step 6.b's state-continuity check is the failure site: the verifier \
tracks a shadow state from the initial declaration and observes \
`from_*` does NOT equal that state. Per §19 step 6.b this is a \
*localizable* failure: the transition-outcome record for the event \
records `continuity_verified = false` and `failures = [\"state_continuity_mismatch\"]`, \
and §19 step 9's `integrity_verified` conjunction (\"no entry in \
report.posture_transitions has continuity_verified = false\") drops \
to false. The signature is valid — the tamper is semantic, not \
cryptographic."""

[coverage]
tr_op = [
    "TR-OP-044",  # verifier state-continuity + attestation + declaration-digest rule (Companion §19.9 → Core §19 step 6)
]

[inputs]
ledger                         = "input-tampered-ledger.cbor"
tampered_event                 = "input-tampered-event.cbor"
signing_key_registry           = "input-signing-key-registry.cbor"
initial_posture_declaration    = "input-initial-posture-declaration.bin"
posture_declaration            = "input-posture-declaration.bin"

# Expected VerificationReport field values. Runner pass criteria:
#   (a) structure_verified == true — the tampered event decodes and signs
#       cleanly; step 6.b is a *localizable* failure per Core §19.
#   (b) integrity_verified == false — set by the step-9 AND conjunction
#       that includes "no entry in report.posture_transitions has
#       continuity_verified = false".
#   (c) readability_verified == true — no payload decryption attempted;
#       the PayloadInline marker bytes are opaque structural test data.
#   (d) tamper_kind == "state_continuity_mismatch" — the pinned failure
#       code per tamper/001's tamper-kind enum.
#   (e) failing_event_id is the canonical_event_hash of the tampered
#       event (the event's own identity per §9.2, not a pre-tamper one
#       — unlike tamper/001, where the payload is unchanged and so the
#       pre-tamper identity is the right anchor, here the payload IS
#       the mutation site so the canonical_event_hash is of the
#       tampered content).
[expected.report]
structure_verified   = true
integrity_verified   = false
readability_verified = true
tamper_kind          = "state_continuity_mismatch"
failing_event_id     = "e024a548dfc0a00a9af2b62124ab04d184498f2795fa613b6ed854f0766c83d1"

idempotency_key = "tamper-transition-002"

[derivation]
document = "derivation.md"
