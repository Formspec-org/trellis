description = "Posture-transition state-continuity tamper. The tampered event is a `trellis.custody-model-transition.v1` event whose `from_custody_model = \"CM-C\"` contradicts the deployment's initial posture declaration, which pins `custody_model = \"CM-B\"`. Core §19 step 6.b's state-continuity check is the failure site: the verifier tracks a shadow state from the initial declaration and observes `from_*` does NOT equal that state. Per §19 step 6.b this is a *localizable* failure: the transition-outcome record for the event records `continuity_verified = false` and `failures = [\"state_continuity_mismatch\"]`, and §19 step 9's `integrity_verified` conjunction (\"no entry in report.posture_transitions has continuity_verified = false\") drops to false. The signature is valid — the tamper is semantic, not cryptographic."

