id = "tamper/042-timestamp-legacy-uint-rejected"
op = "tamper"
status = "active"
description = "Mutates append/001's `authored_at` from protobuf-pattern `[1745000000, 0]` to legacy bare uint `1745000000`, re-encodes the payload as dCBOR, and re-signs under issuer-001. Signatures verify, but the event payload fails to decode: `map_lookup_timestamp` encounters `Value::Integer` where `Value::Array` is required, triggering `legacy_timestamp_format` rejection per ADR 0069 D-2.1."

[coverage]
tr_core = [
    "TR-CORE-092",
]

[inputs]
ledger = "input-tampered-ledger.cbor"
tampered_event = "input-tampered-event.cbor"
signing_key_registry = "input-signing-key-registry.cbor"

[expected.report]
structure_verified = false
integrity_verified = false
readability_verified = false
tamper_kind = "legacy_timestamp_format"
failing_event_id = "structure"

