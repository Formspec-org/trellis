id = "tamper/045-timestamp-nanos-out-of-range"
op = "tamper"
status = "active"
description = "Mutates append/001's `authored_at` from `[1745000000, 0]` to `[1745000000, 1000000000]`, re-encodes the payload as dCBOR, and re-signs under issuer-001. Signatures verify, but the event payload fails to decode because the timestamp nanosecond component exceeds the Core §28 CDDL bound, triggering `timestamp_nanos_out_of_range` per ADR 0069 D-2.1."

[coverage]
tr_core = [
    "TR-CORE-093",
]

[inputs]
ledger = "input-tampered-ledger.cbor"
tampered_event = "input-tampered-event.cbor"
signing_key_registry = "input-signing-key-registry.cbor"

[expected.report]
structure_verified = false
integrity_verified = false
readability_verified = false
tamper_kind = "timestamp_nanos_out_of_range"
failing_event_id = "structure"

[derivation]
document = "derivation.md"
