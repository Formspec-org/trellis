id = "tamper/001-signature-flip"
op = "tamper"
status = "active"
description = "First tamper vector. Establishes the tamper-op manifest shape (`[expected.report]` sub-table with `tamper_kind` and `failing_event_id`) that every subsequent tamper vector inherits. Tampers a single byte in the 64-byte Ed25519 signature of `append/005-prior-head-chain`'s COSE_Sign1 event — the lowest-signal mutation a Core §7.4 signature profile can tolerate. Exercises Core §19's per-event signature-verify branch (step 4.b / step 4.k): the envelope still decodes cleanly through step 4.c, the canonical_event_hash and prev_hash chain checks at step 4.d / 4.e / 4.h still pass because the hash is computed over the payload bytes (unchanged) rather than the signature, and §19 step 9's `integrity_verified` conjunction flips to false via the accumulated `event_failures` from step 4.k. The runner compares inline [expected.report] fields against the §19 report it produces — this vector does NOT byte-compare output artifacts."

[coverage]
tr_core = [
    "TR-CORE-061",
    "TR-CORE-068",
]

[inputs]
ledger = "input-tampered-ledger.cbor"
tampered_event = "input-tampered-event.cbor"
signing_key_registry = "input-signing-key-registry.cbor"

[expected.report]
structure_verified = true
integrity_verified = false
readability_verified = true
tamper_kind = "signature_invalid"
failing_event_id = "7a8574461a5fb60b6ee60c552e414aaf45aefba3ca1b6cc71fa72d029537c020"
idempotency_key = "tamper-sigflip-001"

[derivation]
document = "derivation.md"
