id          = "append/037-user-content-attestation-multi-attestor"
op          = "append"
status      = "active"
description = """ADR 0010 §"Fixture plan" multi-attestor positive vector. Distinct `attestation_id` (per-role), distinct `signing_intent` (applicant role), non-null `identity_attestation_ref`. The ADR's two-attestor scenario maps to two byte-distinct events with disjoint `attestation_id` values; this fixture pins the primary applicant attestation. Witness / co-signer attestations follow the same shape with `attestor` + `attestation_id` + `signing_intent` distinguishing the role."""

