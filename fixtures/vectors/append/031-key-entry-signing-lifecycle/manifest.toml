id          = "append/031-key-entry-signing-lifecycle"
op          = "append"
status      = "active"
description = """`KeyEntry` taxonomy migration baseline (ADR 0006). Re-pins \
the rotation lifecycle of `append/002-rotation-signing-key` under the executed \
unified `KeyEntry` encoding (Core §8.7). Two events in `test-key-entry-ledger`: \
Event A genesis signed by `issuer-001`; Event B sequence=1 chained from A and \
signed by `issuer-002` after the registry rotates. Both registry snapshots \
use the new flat `KeyEntrySigning` arm (top-level `kind: "signing"` field \
plus the eight legacy fields). The verifier dispatches on `kind` per Core \
§8.7.3 and verifies both events; invariant #7 (TR-CORE-038) reproduces \
unchanged because §9.5 has no kid / signing-key-registry input. Per ADR 0006 \
*Wire preservation*, this is **not** byte-equal to 002's flat-shape registry \
CBOR; the migration is an explicit registry-snapshot wire evolution and the \
bytes here are the new golden artifacts."""

[coverage]
tr_core = [
    "TR-CORE-036",  # inv #2 — verifier resolves prior signature after rotation under the new KeyEntry shape.
    "TR-CORE-037",  # inv #3 — registry snapshot is self-contained at any future date.
    "TR-CORE-038",  # inv #7 — key_bag / author_event_hash immutable under rotation (registry shape change does not perturb §9.5 inputs).
    "TR-CORE-039",  # ADR 0006 — unified KeyEntry taxonomy + verifier dispatch on `kind`.
]

[inputs]
signing_key_a                   = "../../_keys/issuer-001.cose_key"
signing_key_b                   = "../../_keys/issuer-002.cose_key"
payload                         = "../../_inputs/sample-payload-001.bin"
pre_rotation_event              = "input-pre-rotation-event.cbor"
pre_rotation_append_head        = "input-pre-rotation-append-head.cbor"
signing_key_registry_before     = "input-signing-key-registry-before.cbor"
signing_key_registry_after      = "input-signing-key-registry-after.cbor"
authored_event                  = "input-author-event-hash-preimage.cbor"

[expected]
author_event_hash = "author-event-hash.bin"
canonical_event   = "expected-event-payload.cbor"
signed_event      = "expected-event.cbor"
append_head       = "expected-append-head.cbor"

[derivation]
document = "derivation.md"
