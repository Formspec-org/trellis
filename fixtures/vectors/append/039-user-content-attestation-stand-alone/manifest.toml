id          = "append/039-user-content-attestation-stand-alone"
op          = "append"
status      = "active"
description = """ADR 0010 §"Composition with existing primitives" stand-alone positive vector. Bare attestation event with `signing_intent = urn:wos:signature-intent:notarial-attestation` — no `SignatureAffirmation` host, no certificate-of-completion. The verifier path is identical to 036; verification independence (Core §16) holds."""

[coverage]
tr_core = [
    "TR-CORE-001",
    "TR-CORE-018",
    "TR-CORE-021",
    "TR-CORE-030",
    "TR-CORE-031",
    "TR-CORE-035",
    "TR-CORE-050",
    "TR-CORE-051",
    "TR-CORE-080",
    "TR-CORE-152",
]

[inputs]
signing_key                  = "../../_keys/issuer-001.cose_key"
authored_event               = "input-author-event-hash-preimage.cbor"
user_content_attestation_payload = "input-uca-payload.cbor"
user_content_attestation_signature_preimage = "input-uca-signature-preimage.cbor"
user_content_attestation_signature = "input-uca-signature.bin"

[expected]
author_event_hash = "author-event-hash.bin"
canonical_event   = "expected-event-payload.cbor"
signed_event      = "expected-event.cbor"
append_head       = "expected-append-head.cbor"

[derivation]
document = "derivation.md"
